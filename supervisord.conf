[supervisord]
nodaemon=true

[program:desktop]
; Ejecuta el script principal
command=/usr/local/bin/start-vnc.sh

; Evita la advertencia de supervisor ejecutándose como root
user=root

autostart=true
autorestart=true
startsecs=10          ; Aumentado de 5 a 10 segundos
startretries=3        ; Solo 3 intentos en lugar de infinito
stopasgroup=true
killasgroup=true

stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

priority=10